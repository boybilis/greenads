<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Green Ads and Promats, Inc. | Log in</title>
  <!-- Tell the browser to be responsive to screen width -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="plugins/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="plugins/toastr/toastr.min.css">
  <!-- Ionicons -->
  <link rel="stylesheet" href="https://code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css">
  <!-- icheck bootstrap -->
  <link rel="stylesheet" href="plugins/icheck-bootstrap/icheck-bootstrap.min.css">
  <!-- Theme style -->
  <link rel="stylesheet" href="dist/css/adminlte.min.css">
  <!-- Google Font: Source Sans Pro -->
  <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700" rel="stylesheet">
</head>
<body class="hold-transition login-page">
<div class="login-box">
  <div class="login-logo">
    <a href="index2.html"><b>GA & P, </b>Inc.</a>
  </div>
  <!-- /.login-logo -->
  <div class="card">
    <div class="card-body login-card-body">
      <p class="login-box-msg">Sign in to start your session</p>

      <form id="loginForm">
  <div class="input-group mb-3">
    <input type="text" class="form-control" name="user_code" id="user_code" placeholder="User Code" required>
    <div class="input-group-append">
      <div class="input-group-text">
        <span class="fas fa-envelope"></span>
      </div>
    </div>
  </div>

  <div class="input-group mb-3">
    <input type="password" class="form-control" name="pword" id="pword" placeholder="Password" required>
    <div class="input-group-append">
      <div class="input-group-text">
        <span class="fas fa-lock"></span>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-8"></div>
    <div class="col-4">
      <button type="submit" id="loginBtn" class="btn btn-primary btn-block">Sign In</button>
    </div>
  </div>
</form>

   
      <!-- /.social-auth-links -->

      <p class="mb-1">
        <a href="forgot-password.html">I forgot my password</a>
      </p>
    
    </div>
    <!-- /.login-card-body -->
  </div>
</div>
<!-- /.login-box -->

<!-- jQuery -->
<script src="plugins/jquery/jquery.min.js"></script>
<!-- Bootstrap 4 -->
<script src="plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<!-- AdminLTE App -->
<script src="dist/js/adminlte.min.js"></script>
<script src="plugins/toastr/toastr.min.js"></script>
<script>
$(document).ready(function () {

  toastr.options = {
    closeButton: true,
    progressBar: true,
    positionClass: "toast-top-right",
    timeOut: 3000
  };

  $("#loginForm").on("submit", function (e) {
    e.preventDefault();

    const $btn = $("#loginBtn");

    $.ajax({
      url: "login",
      type: "POST",
      data: $(this).serialize(),
      dataType: "json",
      beforeSend: function () {
        $btn.prop("disabled", true).text("Signing in...");
      },
      success: function (response) {
        if (response.status === "success") {
          toastr.success(response.message);

          setTimeout(function () {
            window.location.href = response.redirect;
          }, 1000);

        } else {
          toastr.error(response.message);
        }
      },
      error: function (xhr) {
        console.error(xhr.responseText);
        toastr.error("Login request failed. Please check your PHP file.");
      },
      complete: function () {
        $btn.prop("disabled", false).text("Sign In");
      }
    });

  });

});
</script>

</body>
</html>
